# tmux configuration (requires tmux >= 3.4)

bind r source-file ~/.tmux.conf \; display "Reloaded!"

if-shell "uname | grep -q Darwin" \
    "set-option -g default-command 'reattach-to-user-namespace -l bash'"

set -g default-terminal "screen-256color"
set -g default-shell "/bin/bash"

# Advertise terminal capabilities to tmux (terminal-features, tmux >= 3.2):
#  - RGB: 24-bit ("true color") so delta/bat shades aren't crushed to the
#    nearest 256-color slot.
#  - clipboard: the outer terminal honours the OSC 52 clipboard escape.
#    Alacritty supports OSC 52 out of the box.
set -as terminal-features ',*:RGB'
set -as terminal-features ',*:clipboard'

# Let tmux copy to the system clipboard via OSC 52. Works locally and over
# SSH without xclip/wl-copy, as long as the outer terminal supports it.
set -g set-clipboard on

set -g status on
set -g status-left " "
set -g status-right " "
set -g status-justify centre

set -gw mode-style fg=colour226,bold

set -g status-style fg=colour254
set -g message-style fg=colour254
set -g pane-active-border-style fg=colour233,bg=colour233
set -g pane-border-style fg=colour233,bg=colour233

#set-option -g allow-rename off

set -g history-limit 99999

unbind C-b
set -g prefix C-Space
bind Space copy-mode
bind C-Space copy-mode

bind v split-window -h -c "#{pane_current_path}"
bind C-v split-window -h -c "#{pane_current_path}"

bind s split-window -v -c "#{pane_current_path}"
bind C-s split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"
bind C-c new-window -c "#{pane_current_path}"

bind-key q kill-window
bind-key C-q kill-window

bind-key x kill-pane
bind-key C-x kill-pane

setw -g aggressive-resize on

# Instead of detaching, switch to next active session
# set-option -g detach-on-destroy off

set-option -g xterm-keys on

setw -g mode-keys vi

set -g mouse on
set -gw window-status-format "#I:#{=10:window_name}#F"

# Copy-mode bindings. With set-clipboard on, copying also emits OSC 52 so the
# selection lands in the system clipboard.
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

bind-key -n M-Up select-pane -U
bind-key -n M-Right select-pane -R
bind-key -n M-Left select-pane -L
bind-key -n M-Down select-pane -D

set -s escape-time 0

# Tmux resurrect
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
